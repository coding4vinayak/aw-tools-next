<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbetWorks | Lead Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/ui-system.css">
    <style>
        :root {
            --admin-primary: #3b82f6;
            --admin-bg: #030712;
            --admin-card: #111827;
            --admin-border: #1f2937;
        }

        body {
            background-color: var(--admin-bg);
            color: #f3f4f6;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--admin-border);
            padding-bottom: 1.5rem;
        }

        .dashboard-title h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--admin-primary);
        }

        .stat-label {
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.5rem;
            color: #fff;
        }

        .leads-table-container {
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #1f2937;
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: #d1d5db;
            font-size: 0.875rem;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--admin-border);
            color: #e5e7eb;
            font-size: 0.9375rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-tool {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .export-btn {
            background: var(--admin-primary);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .export-btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }

        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--admin-bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Admin Access</h2>
            <p style="color:#9ca3af; margin: 1rem 0 2rem;">Please enter your access key.</p>
            <input type="password" id="admin-key" class="aw-modal-input" style="width:100%; margin-bottom:1.5rem;"
                placeholder="Access Key">
            <button class="aw-modal-btn" style="width:100%" onclick="checkAccess()">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashboard-content" class="hidden">
        <header class="dashboard-header">
            <div class="dashboard-title">
                <h1>Leads Dashboard</h1>
                <p style="color: #9ca3af; margin-top: 0.5rem;">AbetWorks Tools Conversion Monitoring</p>
            </div>
            <button class="export-btn" onclick="exportLeads()">
                📥 Export CSV
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Leads</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Leads Today</div>
                <div class="stat-value" id="stat-today">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Top Generator</div>
                <div class="stat-value" id="stat-top" style="font-size: 1.2rem;">-</div>
            </div>
        </div>

        <div class="leads-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Email Address</th>
                        <th>Origin Tool</th>
                    </tr>
                </thead>
                <tbody id="leads-tbody">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentLeads = [];
        let accessKey = localStorage.getItem('abet_admin_key');

        if (accessKey) {
            loadLeads();
        }

        async function checkAccess() {
            const key = document.getElementById('admin-key').value;
            if (!key) return;

            // Try to fetch leads with this key
            const success = await loadLeads(key);
            if (success) {
                localStorage.setItem('abet_admin_key', key);
                accessKey = key;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
            } else {
                alert("Invalid Access Key");
            }
        }

        async function loadLeads(keyToUse = accessKey) {
            try {
                // Fetch Leads
                const resLeads = await fetch(`/api/admin/leads?key=${keyToUse}`);
                if (!resLeads.ok) return false;
                const leads = await resLeads.json();
                currentLeads = leads;
                renderDashboard(leads);

                // Fetch AI Logs
                const resLogs = await fetch(`/api/admin/logs?key=${keyToUse}`);
                if (resLogs.ok) {
                    const logData = await resLogs.json();
                    console.log("AI Logs:", logData);
                    // Stats update from real AI logs
                    if (logData.stats) {
                        const totalAiUses = Object.values(logData.stats).reduce((acc, curr) => acc + curr.count, 0);
                        // Optional: Add more stats display here
                    }
                }

                if (keyToUse) {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('dashboard-content').classList.remove('hidden');
                }
                return true;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        function renderDashboard(leads) {
            const tbody = document.getElementById('leads-tbody');
            tbody.innerHTML = leads.map(l => `
                <tr>
                    <td>${l.time}</td>
                    <td style="font-weight: 600;">${l.email}</td>
                    <td><span class="badge badge-tool">${l.tool}</span></td>
                </tr>
            `).join('');

            // Update Stats
            document.getElementById('stat-total').innerText = leads.length;

            const today = new Date().toISOString().split('T')[0];
            const leadsToday = leads.filter(l => l.time.startsWith(today)).length;
            document.getElementById('stat-today').innerText = leadsToday;

            // Top tool
            const counts = {};
            leads.forEach(l => counts[l.tool] = (counts[l.tool] || 0) + 1);
            const topTool = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('stat-top').innerText = topTool ? topTool[0] : "-";
        }

        function exportLeads() {
            const csv = [
                ['Timestamp', 'Email', 'Tool'],
                ...currentLeads.map(l => [l.time, l.email, l.tool])
            ].map(e => e.join(",")).join("\n");

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `abetworks_leads_${new Date().toISOString().split('T')[0]}.csv`);
            a.click();
        }
    </script>
</body>

</html>
